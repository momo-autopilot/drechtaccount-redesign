<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drechtaccount | Modern Administratiekantoor</title>
    <meta name="description" content="Modern administratiekantoor voor het MKB in Dordrecht">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
    
    <style>
        :root {
            /* Kleuren uit brief - Modern & Dynamisch */
            --primary: #0F172A;
            --secondary: #334155;
            --accent: #3B82F6;
            --background: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --white: #FFFFFF;
            --light-gray: #F3F4F6;
            --gradient: linear-gradient(135deg, #0F172A 0%, #1E40AF 100%);
            
            /* Typografie */
            --font-heading: 'Inter', sans-serif;
            --font-body: 'Open Sans', sans-serif;
            
            /* Spacing */
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 2rem;
            --space-lg: 3rem;
            --space-xl: 4rem;
            --space-2xl: 6rem;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--background);
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: var(--space-md);
        }
        
        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
        }
        
        h2 {
            font-size: clamp(2rem, 4vw, 3rem);
        }
        
        h3 {
            font-size: clamp(1.5rem, 3vw, 2rem);
        }
        
        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--space-md);
        }
        
        .section {
            padding: var(--space-2xl) 0;
        }
        
        /* Header & Navigation */
        header {
            background-color: var(--white);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 0;
        }
        
        .logo {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }
        
        .nav-links {
            display: flex;
            gap: var(--space-lg);
            list-style: none;
        }
        
        .nav-links a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.5rem 0;
            position: relative;
        }
        
        .nav-links a:hover {
            color: var(--accent);
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s;
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        .phone-header {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            transition: all 0.3s;
        }
        
        .phone-header:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }
        
        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--primary);
            cursor: pointer;
        }
        
        /* Hero Section */
        .hero {
            min-height: 90vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: var(--gradient);
            color: var(--white);
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://drechtaccount.nl/wp-content/uploads/2024/05/119771768-59896_1200x800.jpg.webp');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            mix-blend-mode: overlay;
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }
        
        .hero h1 {
            color: var(--white);
            margin-bottom: var(--space-md);
            line-height: 1.1;
        }
        
        .hero-subtitle {
            font-size: 1.25rem;
            margin-bottom: var(--space-xl);
            opacity: 0.9;
            max-width: 600px;
        }
        
        .hero-actions {
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
        }
        
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background-color: var(--accent);
            color: var(--white);
            padding: 1rem 2.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.125rem;
            transition: all 0.3s;
            border: 2px solid var(--accent);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }
        
        .cta-button:hover {
            background-color: transparent;
            color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.4);
        }
        
        .cta-secondary {
            background-color: transparent;
            color: var(--white);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .cta-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--white);
        }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-lg);
            margin-top: var(--space-2xl);
            padding: var(--space-xl);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        
        @media (min-width: 768px) {
            .stats {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            font-size: 0.875rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Services Section */
        .services-section {
            position: relative;
        }
        
        .services-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: var(--light-gray);
            z-index: -1;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: var(--space-lg);
            margin-top: var(--space-xl);
        }
        
        @media (min-width: 768px) {
            .services-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .services-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .service-card {
            background: var(--white);
            border-radius: 16px;
            padding: var(--space-xl);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.4s;
            border: 1px solid rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.4s;
            transform-origin: left;
        }
        
        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }
        
        .service-card:hover::before {
            transform: scaleX(1);
        }
        
        .service-icon {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: var(--space-md);
            background: rgba(59, 130, 246, 0.1);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        
        /* Footer */
        footer {
            background: var(--primary);
            color: var(--white);
            padding: var(--space-2xl) 0 var(--space-lg);
        }
        
        .footer-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--space-xl);
            margin-bottom: var(--space-xl);
        }
        
        @media (min-width: 768px) {
            .footer-content {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .footer-logo {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .footer-tagline {
            opacity: 0.8;
            margin-bottom: var(--space-md);
        }
        
        .footer-links h4 {
            color: var(--white);
            margin-bottom: var(--space-md);
        }
        
        .footer-links ul {
            list-style: none;
        }
        
        .footer-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s;
            display: block;
            margin-bottom: var(--space-xs);
        }
        
        .footer-links a:hover {
            color: var(--white);
        }
        
        .copyright {
            text-align: center;
            padding-top: var(--space-lg);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.875rem;
        }
        
        /* Mobile Navigation */
        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }
            
            .nav-links {
                position: fixed;
                top: 80px;
                left: 0;
                width: 100%;
                background-color: var(--white);
                flex-direction: column;
                padding: var(--space-lg);
                gap: var(--space-md);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
                transform: translateY(-100%);
                opacity: 0;
                transition: all 0.3s;
                z-index: 99;
                border-radius: 0 0 20px 20px;
            }
            
            .nav-links.active {
                transform: translateY(0);
                opacity: 1;
            }
            
            .phone-header {
                display: none;
            }
            
            .section {
                padding: var(--space-xl) 0;
            }
            
            .hero-actions {
                flex-direction: column;
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* Animation Classes */
        .animate {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }
        
        .animate.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Counter Animation */
        .counter {
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">

            <button class="hamburger" id="hamburger">
